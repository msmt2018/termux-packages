name: Build Ubuntu Bootstrap for AndroidIDE

on:
  push:
    branches:
      - com.itsaky.androidide 
  workflow_dispatch:
    inputs:
      release:
        description: 'Ubuntu Release (noble or plucky)'
        required: true
        default: 'noble'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64] # 手机主流架构
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-user-static zip tar

      - name: Create Ubuntu Bootstrap
        env:
          ARCH: ${{ matrix.arch }}
          RELEASE: ${{ github.event.inputs.release }}
          CUSTOM_PKG: "com.itsaky.androidide"
        run: |
          PREFIX="/data/data/${CUSTOM_PKG}/files/usr"
          BUILD_DIR="${GITHUB_WORKSPACE}/ubuntu-bootstrap"
          TARGET_DIR="${BUILD_DIR}${PREFIX}"
          sudo mkdir -p "${TARGET_DIR}"

          # 1. 自動選擇正確的鏡像源
          if [ "${ARCH}" = "x86_64" ]; then
            DEB_ARCH="amd64"
            MIRROR="http://archive.ubuntu.com"
          else
            DEB_ARCH="arm64"
            MIRROR="http://ports.ubuntu.com"
          fi

          echo "Building ${RELEASE} for ${DEB_ARCH} using ${MIRROR}..."

          # 2. 執行 debootstrap
          # 針對開發版 (Plucky) 建議增加 --no-check-gpg 以防密鑰錯誤
          sudo debootstrap \
            --arch=${DEB_ARCH} \
            --variant=minbase \
            --no-check-gpg \
            ${RELEASE} \
            "${TARGET_DIR}" \
            ${MIRROR}

          # 3. 打包 (保持之前路徑結構)
          cd "${BUILD_DIR}"
          sudo zip -r9 "${GITHUB_WORKSPACE}/bootstrap-ubuntu-${RELEASE}-${ARCH}.zip" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-${{ github.event.inputs.release }}-${{ matrix.arch }}-bootstrap
          path: bootstrap-ubuntu-${{ github.event.inputs.release }}-${{ matrix.arch }}.zip
