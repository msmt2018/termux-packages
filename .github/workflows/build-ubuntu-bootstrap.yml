name: Build Ubuntu Bootstrap for AndroidIDE

on:
  push:
    branches:
      - com.itsaky.androidide 
  workflow_dispatch:
    inputs:
      release:
        description: 'Ubuntu Release (noble or plucky)'
        required: true
        default: 'noble'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64] # 手机主流架构
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-user-static zip tar

      - name: Create Ubuntu Bootstrap
        env:
          ARCH: ${{ matrix.arch }}
          RELEASE: ${{ github.event.inputs.release }}
          CUSTOM_PKG: "com.itsaky.androidide"
        run: |
          # 1. 顯式定義路徑，避免拼接出錯
          PREFIX="/data/data/${CUSTOM_PKG}/files/usr"
          BUILD_DIR="${GITHUB_WORKSPACE}/ubuntu-bootstrap"
          TARGET_DIR="${BUILD_DIR}${PREFIX}"
          
          # 2. 確保目錄存在（這是最關鍵的）
          sudo mkdir -p "${TARGET_DIR}"
          
          # 3. 修正架構映射
          DEB_ARCH="arm64"
          [ "${ARCH}" = "x86_64" ] && DEB_ARCH="amd64"
          
          echo "Starting debootstrap to ${TARGET_DIR}..."

          # 4. 使用完整參數格式，防止路徑解析出錯
          # 注意：將 TARGET_DIR 放在 RELEASE 之後，鏡像地址之前
          sudo debootstrap \
            --arch=${DEB_ARCH} \
            --variant=minbase \
            --foreign \
            ${RELEASE} \
            "${TARGET_DIR}" \
            http://ports.ubuntu.com

          # 5. 進入目錄進行適配
          # 由於使用了 --foreign，需要手動處理一些基礎文件夾
          sudo mkdir -p "${TARGET_DIR}/sdcard"
          sudo mkdir -p "${TARGET_DIR}/dev"
          sudo mkdir -p "${TARGET_DIR}/proc"
          
          # 6. 打包
          cd "${BUILD_DIR}"
          sudo zip -r9 "${GITHUB_WORKSPACE}/bootstrap-ubuntu-${RELEASE}-${ARCH}.zip" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-${{ github.event.inputs.release }}-${{ matrix.arch }}-bootstrap
          path: bootstrap-ubuntu-${{ github.event.inputs.release }}-${{ matrix.arch }}.zip
