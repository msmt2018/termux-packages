name: Docker image

on:
  push:
    branches:
      - master
    paths:
      - 'scripts/Dockerfile'
      - 'scripts/properties.sh'
      - 'scripts/setup-android-sdk.sh'
      - 'scripts/setup-ubuntu.sh'
      - 'scripts/setup-cgct.sh'
      - '.github/workflows/docker_image.yml'
  pull_request:
    paths:
      - 'scripts/Dockerfile'
      - 'scripts/properties.sh'
      - 'scripts/setup-android-sdk.sh'
      - 'scripts/setup-ubuntu.sh'
      - 'scripts/setup-cgct.sh'
      - '.github/workflows/docker_image.yml'
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_BASE: termux-package-builder
      IMAGE_CGCT: termux-package-builder-cgct
      IMAGE_ALIASES: termux-docker terminal-packaging
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Optionally skip building image
        if: github.event_name == 'schedule'
        id: skip-build
        env:
          IMAGE_MIN_INTERVAL_DAYS: 30
        run: |
          LAST_TIMESTAMP=$(curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
           -H "Accept: application/vnd.github+json" \
           "https://api.github.com/users/${{ github.repository_owner }}/packages/container/${IMAGE_BASE}/versions" |
            jq --raw-output 'map(select(.metadata.container.tags | contains(["latest"])))[0].created_at')

          if [[ -z "$LAST_TIMESTAMP" || "$LAST_TIMESTAMP" == "null" ]]; then
            echo "No prior latest image found, continuing with build"
            exit 0
          fi

          LAST_UNIX_TIME=$(date -d "$LAST_TIMESTAMP" +%s)
          CURRENT_UNIX_TIME=$(date +%s)
          if (( CURRENT_UNIX_TIME - LAST_UNIX_TIME < IMAGE_MIN_INTERVAL_DAYS*24*60*60 )); then
            echo "Skipping building Docker image: last successful build was done on $LAST_TIMESTAMP (< $IMAGE_MIN_INTERVAL_DAYS days)"
            echo "skip-build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build base image
        if: ${{ steps.skip-build.outputs.skip-build != 'true' }}
        run: |
          docker build --tag "${{ github.repository_owner }}/${IMAGE_BASE}:latest" scripts/
          docker tag "${{ github.repository_owner }}/${IMAGE_BASE}:latest" "ghcr.io/${{ github.repository_owner }}/${IMAGE_BASE}:latest"

      - name: Build CGCT image
        if: ${{ steps.skip-build.outputs.skip-build != 'true' }}
        run: |
          docker build --tag "${{ github.repository_owner }}/${IMAGE_CGCT}:latest" --file scripts/Dockerfile.cgct scripts/
          docker tag "${{ github.repository_owner }}/${IMAGE_CGCT}:latest" "ghcr.io/${{ github.repository_owner }}/${IMAGE_CGCT}:latest"

      - name: Build alias tags from base image
        if: ${{ steps.skip-build.outputs.skip-build != 'true' }}
        run: |
          for image in $IMAGE_ALIASES; do
            docker tag "${{ github.repository_owner }}/${IMAGE_BASE}:latest" "${{ github.repository_owner }}/${image}:latest"
          done

      - name: Login to GHCR
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name != 'pull_request' && steps.skip-build.outputs.skip-build != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name != 'pull_request' && steps.skip-build.outputs.skip-build != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name != 'pull_request' && steps.skip-build.outputs.skip-build != 'true'
        run: |
          for image in "$IMAGE_BASE" "$IMAGE_CGCT"; do
            for t in 1 2 3; do
              if docker push "ghcr.io/${{ github.repository_owner }}/${image}:latest"; then
                break
              elif [ "$t" = "3" ]; then
                echo "Giving up after 3 attempts for ghcr ${image}"
                exit 1
              else
                sleep 20
              fi
            done
          done

          for image in "$IMAGE_BASE" "$IMAGE_CGCT" $IMAGE_ALIASES; do
            for t in 1 2 3; do
              if docker push "${{ github.repository_owner }}/${image}:latest"; then
                break
              elif [ "$t" = "3" ]; then
                echo "Giving up after 3 attempts for dockerhub ${image}"
                exit 1
              else
                sleep 20
              fi
            done
          done
