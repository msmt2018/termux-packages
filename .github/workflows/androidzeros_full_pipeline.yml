name: Androidzeros Full Docker Pipeline

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'
      build_bootstrap:
        description: 'Build bootstrap archive after pushing images'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      bootstrap_arch:
        description: 'Bootstrap architecture'
        required: true
        default: 'aarch64'
        type: choice
        options:
          - aarch64
          - arm
          - i686
          - x86_64

jobs:
  docker-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push all Docker repositories
        env:
          DOCKER_NAMESPACE: androidzeros
          TAG: ${{ github.event.inputs.image_tag }}
        run: |
          ./scripts/docker/androidzeros-full-pipeline.sh \
            --namespace "$DOCKER_NAMESPACE" \
            --tag "$TAG" \
            --build --push --verbose

      - name: Load builder image and build bootstrap
        if: ${{ github.event.inputs.build_bootstrap == 'true' }}
        env:
          TERMUX_BUILDER_IMAGE_NAME: androidzeros/termux-package-builder:${{ github.event.inputs.image_tag }}
        run: |
          ./scripts/run-docker.sh true
          ./scripts/run-docker.sh ./scripts/build-bootstraps.sh --architectures "${{ github.event.inputs.bootstrap_arch }}" -f

      - name: Upload bootstrap artifact
        if: ${{ github.event.inputs.build_bootstrap == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ github.event.inputs.bootstrap_arch }}-${{ github.event.inputs.image_tag }}
          path: output
