name: Termux Multi-Distro Builder
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: '编译模式'
        required: true
        default: 'bootstrap'
        type: choice
        options: [bootstrap, package]
      distro:
        description: '核心系统基础'
        required: true
        default: 'ubuntu'
        type: choice
        options: [ubuntu, debian, archlinux, alpine]
      ubuntu_version:
        description: 'Ubuntu 版本 (仅在选择 ubuntu 时生效)'
        required: true
        default: '24.04'
        type: choice
        options: ['24.04', '22.04']
      app_id:
        description: 'Android Data 路径 (如 com.itsaky.androidide)'
        required: true
        default: 'com.itsaky.androidide'
      target_pkg:
        description: '要编译的软件包名 (package模式使用)'
        required: false
        default: 'bash'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize Build Space (磁盘扩容)
        uses: easimon/maximize-build-space@main
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'

      - name: Build Docker Env
        run: docker build -t termux-builder .

      - name: Run Compilation
        run: |
          mkdir -p output
          docker run --rm -v ${{ github.workspace }}/output:/home/builder/build_out \
          -e MODE="${{ github.event.inputs.build_mode }}" \
          -e DISTRO="${{ github.event.inputs.distro }}" \
          -e U_VER="${{ github.event.inputs.ubuntu_version }}" \
          -e APP_ID="${{ github.event.inputs.app_id }}" \
          -e PKG="${{ github.event.inputs.target_pkg }}" \
          termux-builder bash -c "
            set -e
            # 1. 切换包名路径
            sed -i \"s/com.termux/\$APP_ID/g\" ./scripts/properties.sh

            # 2. 处理系统分支与版本映射
            if [ \"\$DISTRO\" == \"archlinux\" ]; then
                git checkout pacman
            elif [ \"\$DISTRO\" == \"ubuntu\" ]; then
                # 根据选择映射 Ubuntu 版本代号
                [ \"\$U_VER\" == \"24.04\" ] && CODENAME=\"noble\" || CODENAME=\"jammy\"
                echo \"配置 Ubuntu \$U_VER (\$CODENAME) Rootfs 编译目标...\"
                # 注入 Ubuntu 源及版本到 bootstrap 脚本
                sed -i \"s/debian/\$CODENAME/g\" ./scripts/build-bootstraps.sh
            fi

            # 3. 执行任务
            if [ \"\$MODE\" == \"bootstrap\" ]; then
                ./scripts/build-bootstraps.sh --architecture aarch64
                cp *.zip /home/builder/build_out/ 2>/dev/null || true
            else
                ./build-package.sh -a aarch64 \$PKG
                cp output/*.deb /home/builder/build_out/ 2>/dev/null || true
                cp output/*.pkg.tar.zst /home/builder/build_out/ 2>/dev/null || true
            fi
          "

      - name: Release Artifacts (Direct Download Link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.distro }}-${{ github.run_id }}
          files: output/*
          name: "Build: ${{ github.event.inputs.app_id }} [${{ github.event.inputs.distro }}]"
          body: |
            - **App ID**: ${{ github.event.inputs.app_id }}
            - **Distro**: ${{ github.event.inputs.distro }} ${{ github.event.inputs.ubuntu_version }}
            - **Mode**: ${{ github.event.inputs.build_mode }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
