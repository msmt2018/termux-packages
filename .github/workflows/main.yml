name: Termux Multi-Distro Builder
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: '编译模式'
        required: true
        default: 'bootstrap'
        type: choice
        options: [bootstrap, package]
      distro:
        description: '核心系统基础'
        required: true
        default: 'ubuntu'
        type: choice
        options: [ubuntu, debian, archlinux, alpine]
      ubuntu_version:
        description: 'Ubuntu 版本 (仅在选择 ubuntu 时生效)'
        required: true
        default: '24.04'
        type: choice
        options: ['24.04', '22.04']
      app_id:
        description: 'Android Data 路径 (如 com.itsaky.androidide)'
        required: true
        default: 'com.itsaky.androidide'
      target_pkg:
        description: '要编译的软件包名 (package模式使用)'
        required: false
        default: 'bash'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 修复点 1：使用具体的版本号 v10
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Build Docker Env
        run: docker build -t termux-builder .

      - name: Run Compilation
        run: |
          mkdir -p output
          docker run --rm -v ${{ github.workspace }}/output:/home/builder/build_out \
          -e MODE="${{ github.event.inputs.build_mode }}" \
          -e DISTRO="${{ github.event.inputs.distro }}" \
          -e U_VER="${{ github.event.inputs.ubuntu_version }}" \
          -e APP_ID="${{ github.event.inputs.app_id }}" \
          -e PKG="${{ github.event.inputs.target_pkg }}" \
          termux-builder bash -c "
            set -e
            # 1. 强制切换包名路径 (深度替换)
            find . -type f -name 'properties.sh' -exec sed -i \"s/com.termux/\$APP_ID/g\" {} +

            # 2. 处理系统分支与版本映射
            if [ \"\$DISTRO\" == \"archlinux\" ]; then
                git checkout pacman
            elif [ \"\$DISTRO\" == \"ubuntu\" ]; then
                # 修复点 2：更精准的 Ubuntu 代号替换逻辑
                CODENAME=\"noble\"
                [ \"\$U_VER\" == \"22.04\" ] && CODENAME=\"jammy\"
                echo \"配置 Ubuntu \$U_VER (\$CODENAME) 编译环境...\"
                
                # 寻找脚本中定义发行版的地方并替换
                sed -i \"s/debian/\$CODENAME/g\" ./scripts/build-bootstraps.sh
            fi

            # 3. 执行任务
            if [ \"\$MODE\" == \"bootstrap\" ]; then
                ./scripts/build-bootstraps.sh --architecture aarch64
                # 寻找生成的 zip 产物
                find . -maxdepth 1 -name '*.zip' -exec cp {} /home/builder/build_out/ \;
            else
                ./build-package.sh -a aarch64 \$PKG
                # 寻找生成的 deb/zst 产物
                find output -name '*.deb' -exec cp {} /home/builder/build_out/ \;
                find output -name '*.zst' -exec cp {} /home/builder/build_out/ \;
            fi
          "

      - name: Release Artifacts (Direct Download Link)
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ github.event.inputs.distro }}-${{ github.run_id }}
          files: output/*
          name: "Termux-Build-${{ github.event.inputs.distro }}-${{ github.event.inputs.ubuntu_version }}"
          body: |
            ### 编译成功！
            - **自定义包名**: `${{ github.event.inputs.app_id }}`
            - **基础发行版**: `${{ github.event.inputs.distro }}`
            - **系统版本**: `${{ github.event.inputs.ubuntu_version }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
